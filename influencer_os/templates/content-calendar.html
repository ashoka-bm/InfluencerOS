<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="influencer-os-source-digest" content="__SOURCE_DIGEST__">
  <title>__DOCUMENT_TITLE__</title>
  <style>
    :root {
      --paper: #f7f4ed;
      --ink: #191917;
      --muted: #6d6a62;
      --line: #d8d2c4;
      --panel: #fffdf8;
      --shadow: 0 18px 45px rgba(25, 25, 23, .14);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--paper); color: var(--ink); font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.35; }
    .shell { width: min(1460px, calc(100vw - 40px)); margin: 0 auto; padding: 32px 0 48px; }
    header { display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(320px, .6fr); gap: 28px; align-items: end; padding-bottom: 22px; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
    h1 { margin: 0 0 10px; font-size: clamp(34px, 5vw, 72px); line-height: .92; letter-spacing: 0; max-width: 980px; overflow-wrap: anywhere; }
    .dek { margin: 0; color: var(--muted); max-width: 820px; font-size: 17px; }
    .meta { display: grid; gap: 10px; font-size: 13px; color: var(--muted); }
    .meta strong { display: block; color: var(--ink); font-size: 14px; margin-bottom: 2px; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0 26px; }
    .chip { display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--line); background: rgba(255, 253, 248, .72); border-radius: 999px; padding: 7px 10px; font-size: 13px; color: var(--muted); }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--platform-color); }
    .month { margin-top: 30px; }
    .month-title { display: flex; justify-content: space-between; gap: 18px; align-items: baseline; margin-bottom: 12px; }
    .month-title h2 { margin: 0; font-size: 28px; letter-spacing: 0; }
    .month-title span { color: var(--muted); font-size: 14px; }
    .calendar { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); border-top: 1px solid var(--line); border-left: 1px solid var(--line); background: var(--line); }
    .weekday, .day { background: var(--panel); border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
    .weekday { min-height: 34px; display: flex; align-items: center; padding: 8px 10px; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
    .day { min-height: 168px; padding: 8px; position: relative; }
    .day.outside { background: #efebe1; color: #aaa398; }
    .date { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 12px; color: var(--muted); font-weight: 700; }
    .week-tag { color: #8f887b; font-weight: 600; }
    .posts { display: grid; gap: 5px; }
    .post { border: 0; border-left: 4px solid var(--platform-color); background: #f7f4ed; color: var(--ink); width: 100%; min-height: 28px; border-radius: 6px; padding: 5px 7px; text-align: left; font: inherit; font-size: 11px; cursor: default; position: relative; display: grid; gap: 1px; box-shadow: inset 0 0 0 1px rgba(25, 25, 23, .06); }
    .post:hover, .post:focus { outline: 2px solid rgba(25, 25, 23, .22); outline-offset: 1px; z-index: 5; }
    .post .platform { font-size: 10px; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
    .post .title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
    .tooltip { display: none; position: absolute; z-index: 20; left: 8px; top: calc(100% + 6px); width: min(330px, 78vw); background: #191917; color: #fffdf8; border-radius: 8px; padding: 12px; box-shadow: var(--shadow); font-size: 12px; line-height: 1.35; }
    .post:hover .tooltip, .post:focus .tooltip { display: grid; gap: 8px; }
    .tooltip strong { display: block; font-size: 13px; margin-bottom: 2px; }
    .tooltip .row { display: grid; grid-template-columns: 70px 1fr; gap: 8px; }
    .tooltip .label { color: #c9c2b4; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; font-size: 10px; }
    .note { margin-top: 28px; border-top: 1px solid var(--line); padding-top: 18px; color: var(--muted); max-width: 920px; font-size: 14px; }
    @media (max-width: 980px) {
      .shell { width: min(100vw - 22px, 760px); padding-top: 22px; }
      header { grid-template-columns: 1fr; }
      .calendar { display: block; border: 0; background: transparent; }
      .weekday { display: none; }
      .day { min-height: auto; margin-bottom: 8px; border: 1px solid var(--line); }
      .day.outside { display: none; }
      .posts { gap: 7px; }
      .post { min-height: 36px; font-size: 13px; }
      .tooltip { position: static; width: 100%; margin-top: 8px; }
    }
    @media print {
      body { background: #fff; }
      .shell { width: 100%; padding: 0; }
      .post { break-inside: avoid; }
      .tooltip { display: none !important; }
      .day { min-height: 142px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div><h1>__HEADING__</h1><p class="dek">__DESCRIPTION__</p></div>
      <div class="meta">
        <div><strong>Schedule window</strong>__SCHEDULE_WINDOW__</div>
        <div><strong>Status</strong>__STATUS__</div>
        <div><strong>Scheduling assumption</strong>__SCHEDULING_NOTE__</div>
      </div>
    </header>
    <div class="legend" aria-label="Platform legend">__LEGEND__</div>
    <section aria-label="Monthly content calendar">__MONTHS__</section>
    <p class="note">__GUARDRAIL_NOTE__</p>
  </main>
</body>
</html>
